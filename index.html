<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соединение установлено</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa, #e4e9f2);
            font-family: 'Roboto', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        
        .card {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            padding: 40px 30px;
            text-align: center;
        }
        
        .vk-logo {
            width: 80px;
            height: 80px;
            background: #5181B8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 48px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 12px rgba(81, 129, 184, 0.3);
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #5181B8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            font-size: 24px;
            margin: 15px 0;
            color: #333;
        }
        
        p {
            color: #666;
            line-height: 1.5;
            margin: 8px 0;
        }
        
        .status {
            color: #34C759;
            font-weight: 500;
            margin: 20px 0;
        }
        
        .button {
            background: #5181B8;
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        
        .button:hover {
            background: #4a76a8;
            transform: translateY(-2px);
        }
        
        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #999;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- VK Logo -->
        <div class="vk-logo">VK</div>
        
        <!-- Spinner -->
        <div class="spinner"></div>
        
        <h1>Соединение установлено</h1>
        <p>Вы перенаправляетесь на сайт партнера.<br>Это займет не более 3 секунд.</p>
        
        <div class="status">Статус: Безопасное подключение</div>
        
        <a href="https://google.com" class="button">
            Перейти на Google
        </a>
        
        <div class="footer">
            Ссылка проверена системой безопасности.<br>
            © 2026 Защищенное распределение трафика.
        </div>
    </div>

    <script>
        // Автоматический редирект через 3 секунды
        setTimeout(() => {
            window.location.href = "https://google.com";
        }, 3000);
    </script>
</body>
</html>
